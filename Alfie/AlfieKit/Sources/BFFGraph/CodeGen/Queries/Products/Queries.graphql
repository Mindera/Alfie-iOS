query ProductListQuery(
    $collectionHandle: String!,
    $platform: String!,
    $after: String,
    $limit: Int!,
    $filters: ProductFilterInput,
    $sort: ProductSortEnum = NEWEST
) {
    productList(
        collectionHandle: $collectionHandle,
        platform: $platform,
        after: $after,
        limit: $limit,
        filters: $filters,
        sort: $sort
    ) {
        totalCount
        pageInfo {
            endCursor
            hasNextPage
        }
        products {
            ...ProductListItemFragment
        }
    }
}

query SearchProductsQuery(
    $searchTerm: String!,
    $platform: String!,
    $after: String,
    $limit: Int!,
    $filters: ProductFilterInput,
    $sort: ProductSortEnum = NEWEST
) {
    searchProducts(
        searchTerm: $searchTerm,
        platform: $platform,
        after: $after,
        limit: $limit,
        filters: $filters,
        sort: $sort
    ) {
        totalCount
        pageInfo {
            endCursor
            hasNextPage
        }
        products {
            ...ProductListItemFragment
        }
    }
}
