query MainMenuQuery(
    $handle: String!,
    $platform: String
) {
    mainMenu(handle: $handle, platform: $platform) {
        handle
        title
        items {
            id
            title
            url
            items {
                id
                title
                url
                items {
                    id
                    title
                    url
                }
            }
        }
    }
}
